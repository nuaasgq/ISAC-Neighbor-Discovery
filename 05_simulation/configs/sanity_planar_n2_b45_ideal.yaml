experiment:
  name: "sanity_planar_n2_b45_ideal"
  seed: 20260712
  episodes: 1000
  slots_per_episode: 16
  slot_metric_period: 1
  slot_duration_ms: 5

network:
  node_count: 2
  area_shape: "square"
  area_size_m: [100, 100, 0]
  communication_range_m: 1000
  sensing_range_m: 1000
  self_localization_available: true
  self_attitude_available: true
  mobility:
    model: "static"
    spatial_dimensions: 2
    fixed_altitude_m: 0.0
    speed_min_mps: 0.0
    speed_max_mps: 0.0
    mean_speed_mps: 0.0
    speed_std_mps: 0.0

beam:
  azimuth_cells: [8]
  elevation_cells: [1]
  alignment_tolerance_cells: 0
  rf_chains: [1]
  main_lobe_model: "ideal_cell_coverage"
  sidelobe_model: "none"

slot:
  synchronized: true
  p_sense: 0.0
  p_tx: 0.5
  p_rx: 0.5
  p_idle: 0.0

isac_error:
  false_alarm_rates: [0.0]
  miss_detection_rates: [0.0]
  angular_cell_offsets: [0.0]
  sensing_periods: [1]
  belief_update_rho: 0.5

phy_sensing:
  model: "constant_error"
  waveform: "abstract"
  measurement_mode: "ideal_count"
  position_error_std_m: 0.0

phy_communication:
  model: "ideal"
  fading_enabled: false
  shadowing_enabled: false

protocol:
  exploration_floor: 0.0
  softmax_beta: 1.0
  target_degree: 1
  alpha_occupancy: 1.0
  beta_diversity: 0.0
  gamma_degree_need: 0.0
  eta_staleness: 0.0
  confidence_decay: 1.0
  rendezvous_observation_enabled: false

energy:
  tx_power_w: 1.0
  rx_power_w: 0.6
  sense_power_w: 1.2
  idle_power_w: 0.05
  piggyback_sense_power_w: 0.0

baselines:
  - "uniform_random"
  - "structured_marl_no_isac"
