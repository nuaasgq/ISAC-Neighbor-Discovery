experiment:
  name: "mvp_002_dynamic_pruning"
  seed: 20260704
  episodes: 50
  train_slots_per_episode: 300
  eval_horizons_slots: [300, 1200, 3000]
  slots_per_episode: 300
  slot_duration_ms: 10

network:
  node_counts: [30]
  area_shape: "cube"
  area_size_m: [1000, 1000, 300]
  communication_range_m: 300
  sensing_range_m: 350
  mobility: "gauss_markov"
  self_localization_available: true
  self_attitude_available: true
  localization_error_std_m: 0.0
  attitude_error_std_deg: 0.0

mobility:
  default_model: "gauss_markov"
  model_sweep: ["gauss_markov", "random_direction", "random_walk", "random_waypoint"]
  boundary: "reflect"
  min_speed_mps: 3.0
  max_speed_mps: 30.0
  mean_speed_mps: 15.0
  speed_std_mps: 2.0
  gauss_markov_alpha: 0.85
  random_walk_step_std_m: 0.25
  direction_update_interval_slots: 50
  waypoint_threshold_m: 5.0
  waypoint_pause_slots: 0
  max_pitch_deg: 25.0

beam:
  azimuth_cells: [24]
  elevation_cells: [8]
  alignment_tolerance_cells: 0
  main_lobe_model: "ideal_cell_coverage"
  sidelobe_model: "none"

slot:
  synchronized: true
  p_sense: 0.10
  p_tx: 0.45
  p_rx: 0.45
  p_idle: 0.00

isac_error:
  false_alarm_rates: [0.02]
  miss_detection_rates: [0.15]
  angular_cell_offsets: [0.5]
  sensing_periods: [5]
  belief_update_rho: 0.5

protocol:
  exploration_floor: 0.10
  softmax_beta: 2.0
  target_degree: 4
  alpha_occupancy: 1.0
  beta_diversity: 0.5
  gamma_degree_need: 0.5
  eta_staleness: 0.2
  confidence_decay: 0.95

baselines:
  - "uniform_random"
  - "deterministic_scan"
  - "crt_oblivious_like"
  - "skyorbs_like_skip_scan"
  - "isac_only"
  - "topology_only"
  - "itap_nd"
  - "oracle"

metrics:
  censored_delay_value: "slots_per_episode"
  consensus_error_threshold: 1.0e-3
  discovery:
    - "mean_delay"
    - "p90_delay"
    - "p95_delay"
    - "p99_delay"
    - "finite_time_discovery_rate"
    - "empty_scan_ratio"
  topology:
    - "discovered_edges"
    - "connected_components"
    - "largest_component_size"
    - "algebraic_connectivity"
  consensus:
    - "consensus_error_curve"
    - "time_to_error_threshold"
